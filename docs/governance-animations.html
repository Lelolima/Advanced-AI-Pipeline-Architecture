<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SVGs Animados - Task Governance</title>
</head>
<body>

<!-- SVG 1: Fluxo de Estados -->
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4285f4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#db2777;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Título -->
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">🔄 Task Governance State Flow</text>

  <!-- State boxes -->
  <g id="active" transform="translate(50, 80)">
    <rect width="140" height="60" rx="8" fill="url(#gradient1)" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="2s" repeatCount="indefinite" />
    </rect>
    <text x="70" y="35" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a73e8">Active</text>
  </g>

  <g id="planned" transform="translate(240, 80)">
    <rect width="140" height="60" rx="8" fill="url(#gradient2)" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="2s" begin="0.4s" repeatCount="indefinite" />
    </rect>
    <text x="70" y="35" text-anchor="middle" font-size="14" font-weight="bold" fill="#d97706">Planned</text>
  </g>

  <g id="awaiting" transform="translate(430, 80)">
    <circle cx="70" cy="30" r="25" fill="none" stroke="#db2777" stroke-width="3">
      <animate attributeName="r" values="20;30;20" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite" />
    </circle>
    <rect width="140" height="60" rx="8" fill="url(#gradient3)" opacity="0.2"/>
    <text x="70" y="35" text-anchor="middle" font-size="14" font-weight="bold" fill="#db2777">Awaiting</text>
  </g>

  <g id="executing" transform="translate(620, 80)">
    <rect width="140" height="60" rx="8" fill="url(#gradient4)" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="1s" repeatCount="indefinite" />
    </rect>
    <text x="70" y="35" text-anchor="middle" font-size="14" font-weight="bold" fill="#4f46e5">Executing</text>
  </g>

  <g id="validated" transform="translate(430, 200)">
    <rect width="140" height="60" rx="8" fill="url(#gradient5)" opacity="0.2"/>
    <path d="M60 30 L65 35 L75 25" stroke="#059669" stroke-width="3" fill="none">
      <animate attributeName="stroke-dasharray" from="0,100" to="100,100" dur="0.5s" begin="2s" fill="freeze" />
    </path>
    <text x="70" y="35" text-anchor="middle" font-size="14" font-weight="bold" fill="#059669">Validated</text>
  </g>

  <g id="closed" transform="translate(620, 200)">
    <rect width="140" height="60" rx="8" fill="#6b7280" opacity="0.3"/>
    <text x="70" y="35" text-anchor="middle" font-size="14" font-weight="bold" fill="#6b7280">Closed</text>
  </g>

  <!-- Arrows -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <path d="M190 110 L230 110">
      <animate attributeName="stroke-dasharray" values="0,1000;1000,0" dur="3s" repeatCount="indefinite" />
    </path>
    <polygon points="230,110 220,105 220,115" fill="#94a3b8"/>

    <path d="M380 110 L420 110"/>
    <polygon points="420,110 410,105 410,115" fill="#94a3b8"/>

    <path d="M570 110 L610 110">
      <animate attributeName="stroke-dasharray" values="0,1000;1000,0" dur="3s" begin="1s" repeatCount="indefinite" />
    </path>
    <polygon points="610,110 600,105 600,115" fill="#94a3b8"/>

    <path d="M690 140 L690 180 L650 195">
      <animate attributeName="stroke-dasharray" values="0,1000;1000,0" dur="3s" begin="2s" repeatCount="indefinite" />
    </path>
    <polygon points="650,195 655,185 655,200" fill="#94a3b8"/>

    <path d="M570 200 L530 200"/>
    <polygon points="530,200 540,195 540,205" fill="#94a3b8"/>

    <!-- Feedback loop -->
    <path d="M500 90 Q500 50 460 50 L440 50" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
    <polygon points="440,50 450,45 450,55" fill="#f59e0b"/>
    <text x="470" y="45" font-size="10" fill="#f59e0b">Revisão</text>
  </g>
</svg>

<!-- SVG 2: Approval Gate Animation -->
<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">🔒 Approval Gate</text>

  <!-- Gate background -->
  <rect x="200" y="80" width="400" height="140" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="3"/>

  <!-- Lock icon -->
  <g transform="translate(370, 100)">
    <rect x="10" y="30" width="40" height="30" rx="4" fill="#dc2626"/>
    <path d="M20 30 V15 A10 10 0 0 1 40 15 V30" stroke="#dc2626" stroke-width="4" fill="none"/>
    <animate attributeName="transform" values="translate(370,100); translate(370,105); translate(370,100)" dur="2s" repeatCount="indefinite"/>
  </g>

  <!-- Warning text -->
  <text x="400" y="160" text-anchor="middle" font-size="14" fill="#dc2626" font-weight="bold">
    ⚠️ Ação Requer Aprovação
  </text>

  <!-- Authorization phrases -->
  <g transform="translate(400, 190)">
    <rect x="-120" y="-15" width="240" height="30" rx="6" fill="#1a73e8" opacity="0.1">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="0" y="5" text-anchor="middle" font-size="12" fill="#1a73e8" font-family="monospace">
      "implemente" | "execute o plano"
    </text>
  </g>

  <!-- Pulsing ring -->
  <circle cx="400" cy="150" r="80" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.3">
    <animate attributeName="r" values="60;100;60" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>

<!-- SVG 3: Delegation Flow -->
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">👥 Safe Delegation Pattern</text>

  <!-- Coordinator -->
  <g transform="translate(350, 70)">
    <rect width="100" height="50" rx="8" fill="#1a73e8" filter="url(#glow)"/>
    <text x="50" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Coordinator</text>
  </g>

  <!-- Agent 1 -->
  <g transform="translate(100, 180)">
    <rect width="120" height="50" rx="8" fill="#10b981" opacity="0.8"/>
    <text x="60" y="25" text-anchor="middle" font-size="12" fill="white">Agent 1</text>
    <text x="60" y="40" text-anchor="middle" font-size="10" fill="white">Task A</text>
    <animateTransform attributeName="transform" type="translate" values="100,180 110,180 100,180" dur="2s" repeatCount="indefinite"/>
  </g>

  <!-- Agent 2 -->
  <g transform="translate(340, 180)">
    <rect width="120" height="50" rx="8" fill="#f59e0b" opacity="0.8"/>
    <text x="60" y="25" text-anchor="middle" font-size="12" fill="white">Agent 2</text>
    <text x="60" y="40" text-anchor="middle" font-size="10" fill="white">Task B</text>
    <animateTransform attributeName="transform" type="translate" values="340,180 350,180 340,180" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </g>

  <!-- Agent 3 -->
  <g transform="translate(580, 180)">
    <rect width="120" height="50" rx="8" fill="#8b5cf6" opacity="0.8"/>
    <text x="60" y="25" text-anchor="middle" font-size="12" fill="white">Agent 3</text>
    <text x="60" y="40" text-anchor="middle" font-size="10" fill="white">Task C</text>
    <animateTransform attributeName="transform" type="translate" values="580,180 590,180 580,180" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </g>

  <!-- Results integration -->
  <g transform="translate(350, 300)">
    <rect width="100" height="50" rx="8" fill="#059669"/>
    <text x="50" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="white">✅ Verify</text>
  </g>

  <!-- Arrows -->
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)">
    <line x1="400" y1="120" x2="160" y2="180"/>
    <line x1="400" y1="120" x2="340" y2="180"/>
    <line x1="400" y1="120" x2="580" y2="180"/>
    <line x1="160" y1="230" x2="400" y2="300"/>
    <line x1="400" y1="230" x2="400" y2="300"/>
    <line x1="640" y1="230" x2="450" y2="300"/>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>

<!-- SVG 4: Validation Flow -->
<svg width="800" height="350" viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">✅ Validation Pipeline</text>

  <!-- Pipeline stages -->
  <g transform="translate(50, 100)">
    <!-- Stage 1 -->
    <rect x="0" y="0" width="130" height="80" rx="8" fill="#dbeafe" stroke="#1a73e8" stroke-width="2"/>
    <text x="65" y="35" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a73e8">Type Check</text>
    <text x="65" y="55" text-anchor="middle" font-size="10" fill="#64748b">TypeScript</text>
    <circle cx="110" cy="20" r="15" fill="#059669">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <path d="M103 20 L107 24 L115 16" stroke="white" stroke-width="3" fill="none"/>
  </g>

  <g transform="translate(220, 100)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="65" y="35" text-anchor="middle" font-size="12" font-weight="bold" fill="#d97706">Lint Check</text>
    <text x="65" y="55" text-anchor="middle" font-size="10" fill="#64748b">ESLint</text>
    <circle cx="110" cy="20" r="15" fill="#059669">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <path d="M103 20 L107 24 L115 16" stroke="white" stroke-width="3" fill="none"/>
  </g>

  <g transform="translate(390, 100)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
    <text x="65" y="35" text-anchor="middle" font-size="12" font-weight="bold" fill="#db2777">Test Run</text>
    <text x="65" y="55" text-anchor="middle" font-size="10" fill="#64748b">Vitest</text>
    <circle cx="110" cy="20" r="15" fill="#059669">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <path d="M103 20 L107 24 L115 16" stroke="white" stroke-width="3" fill="none"/>
  </g>

  <g transform="translate(560, 100)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
    <text x="65" y="35" text-anchor="middle" font-size="12" font-weight="bold" fill="#059669">Build</text>
    <text x="65" y="55" text-anchor="middle" font-size="10" fill="#64748b">Production</text>
    <circle cx="110" cy="20" r="15" fill="#059669">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <path d="M103 20 L107 24 L115 16" stroke="white" stroke-width="3" fill="none"/>
  </g>

  <!-- Flow animation -->
  <path d="M180 140 L210 140" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrowhead2)">
    <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M350 140 L380 140" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrowhead2)">
    <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </path>
  <path d="M520 140 L550 140" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrowhead2)">
    <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="2s" begin="1s" repeatCount="indefinite"/>
  </path>

  <defs>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Success indicator -->
  <g transform="translate(720, 120)">
    <circle cx="20" cy="20" r="20" fill="#059669">
      <animate attributeName="r" values="15;20;15" dur="2s" repeatCount="indefinite"/>
    </circle>
    <path d="M12 20 L17 25 L28 14" stroke="white" stroke-width="3" fill="none"/>
  </g>

  <!-- Final report -->
  <rect x="50" y="250" width="700" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="275" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">📋 Validation Report</text>
  <text x="400" y="295" text-anchor="middle" font-size="10" fill="#64748b">✅ All checks passed • 0 errors • 4 checks completed</text>
</svg>

</body>
</html>
